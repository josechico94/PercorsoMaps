<!doctype html>
<html lang="it" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pianificatore Percorsi — Beta</title>

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { font-family: 'DM Sans', sans-serif; }
    html, body { height: 100%; }
    body { overflow: hidden; box-sizing: border-box; }
    .leaflet-container { background: #0b1220; }

    #map { position: absolute; inset: 0; z-index: 1; }
    .leaflet-control-container { z-index: 2 !important; }
    .leaflet-pane { z-index: 1 !important; }
    .leaflet-top, .leaflet-bottom { z-index: 2 !important; }

    #sidebar { z-index: 60; }
    #sidebar-backdrop { z-index: 55; }
    #route-info { z-index: 40; }
    #route-fab { z-index: 45; }
    #nav-panel { z-index: 50; }
    #loading { z-index: 70; }
    #toast-container { z-index: 80; }

    .nice-scroll::-webkit-scrollbar { width: 10px; }
    .nice-scroll::-webkit-scrollbar-track { background: rgba(148,163,184,0.08); border-radius: 999px; }
    .nice-scroll::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.25); border-radius: 999px; }
    .nice-scroll::-webkit-scrollbar-thumb:hover { background: rgba(148,163,184,0.35); }

    .custom-marker {
      width: 24px; height: 24px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: 3px solid #fff;
      border-radius: 50%;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
    }
    .selected-marker {
      background: linear-gradient(135deg, #f59e0b, #ef4444) !important;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }

    .route-badge-wrap { position: relative; width: 28px; height: 28px; }
    .route-badge-wrap .dot {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 24px; height: 24px;
      border-radius: 50%;
      border: 3px solid #fff;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.35);
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
    }
    .route-badge-wrap.selected .dot {
      background: linear-gradient(135deg, #f59e0b, #ef4444);
    }
    .route-badge-wrap .badge {
      position: absolute;
      right: -6px;
      top: -6px;
      width: 20px; height: 20px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.95);
      background: rgba(15,23,42,0.95);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800;
      font-size: 11px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.35);
    }
    .route-badge-wrap .badge.start { background: rgba(16,185,129,0.95); }
    .route-badge-wrap .badge.end { background: rgba(239,68,68,0.95); }

    .toast { animation: slideIn 0.25s ease-out; }
    @keyframes slideIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }

    .address-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
    .btn-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); transition: all 0.2s ease; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99, 102, 241, 0.35); }

    #route-info { max-height: 70vh; overflow: auto; }
    @media (max-width: 1023px) {
      #route-info {
        top: auto !important;
        right: 12px !important;
        left: 12px !important;
        bottom: 86px !important;
        width: auto !important;
        max-width: none !important;
        max-height: 38vh !important;
        border-radius: 18px !important;
      }
    }

    #nav-panel {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      background: rgba(15,23,42,0.92);
      border: 1px solid rgba(148,163,184,0.25);
      backdrop-filter: blur(12px);
      border-radius: 18px;
      padding: 10px 12px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.45);
      display: none;
    }
    @media (min-width: 1024px) {
      #nav-panel {
        left: auto;
        right: 16px;
        bottom: 16px;
        width: 360px;
      }
    }

    .leaflet-tooltip {
      background: rgba(15,23,42,0.95);
      color: #fff;
      border: 1px solid rgba(148,163,184,0.25);
      border-radius: 12px;
      padding: 8px 10px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.35);
    }
  </style>
</head>

<body class="h-full bg-slate-900 text-white overflow-hidden">
  <div id="app" class="h-full flex flex-col">
    <header class="bg-slate-800/80 backdrop-blur-lg border-b border-slate-700 px-4 py-3 flex items-center justify-between flex-shrink-0">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />
          </svg>
        </div>
        <h1 class="text-xl font-bold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">
          Pianificatore Percorsi — Beta
        </h1>
      </div>

      <div class="flex items-center gap-2">
        <span id="address-count" class="text-sm text-slate-400">0 indirizzi</span>
        <button id="toggle-panel" class="lg:hidden p-2 rounded-lg bg-slate-700 hover:bg-slate-600" title="Apri pannello">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
      </div>
    </header>

    <main class="flex-1 flex overflow-hidden relative">
      <div id="sidebar-backdrop" class="fixed inset-0 bg-black/60 hidden lg:hidden"></div>

      <aside id="sidebar"
        class="fixed lg:relative inset-y-0 left-0
               w-[min(420px,92vw)] lg:w-[420px]
               bg-slate-800/80 backdrop-blur
               border-r border-slate-700
               flex flex-col overflow-hidden
               transform -translate-x-full lg:translate-x-0
               transition-transform duration-200 ease-out">

        <div id="sidebar-scroll" class="flex-1 overflow-y-auto nice-scroll">

          <div class="p-4 border-b border-slate-700">
            <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">Nuovo Indirizzo</h2>
            <form id="address-form" class="space-y-3">
              <input type="text" id="company-input" placeholder="Azienda"
                class="w-full px-4 py-3 bg-slate-700/50 border border-slate-600 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all" />
              <input type="text" id="address-input" placeholder="Indirizzo completo..."
                class="w-full px-4 py-3 bg-slate-700/50 border border-slate-600 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all" />
              <div class="grid grid-cols-2 gap-3">
                <input type="text" id="postal-input" placeholder="CAP"
                  class="px-4 py-2.5 bg-slate-700/50 border border-slate-600 rounded-xl focus:outline-none focus:border-indigo-500 transition-all" />
              </div>
              <button type="submit" class="w-full py-3 btn-primary text-white font-semibold rounded-xl">
                Aggiungi Indirizzo
              </button>
            </form>

            <button id="toggle-import-form"
              class="w-full mt-3 py-2.5 bg-slate-700 hover:bg-slate-600 text-white font-semibold rounded-xl transition-all text-sm">
              Importa CSV/Excel
            </button>

            <label class="flex items-center gap-2 text-xs text-slate-300 mt-3">
              <input type="checkbox" id="append-bologna" class="accent-indigo-500" checked />
              Autocompleta geocode: aggiungi “, Bologna, Italia” se non presente
            </label>
          </div>

          <div id="import-form-section" class="p-4 border-b border-slate-700 hidden">
            <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">Importa Indirizzi</h2>
            <div class="space-y-3">
              <div class="border-2 border-dashed border-slate-600 rounded-xl p-4 text-center cursor-pointer hover:border-indigo-500 transition-all"
                id="drop-zone">
                <p class="text-sm font-medium">Trascina qui il file</p>
                <p class="text-xs text-slate-400 mt-1">Oppure clicca per selezionarlo</p>
                <input type="file" id="file-input" accept=".csv,.xlsx,.xls" class="hidden" />
              </div>

              <div id="file-preview" class="hidden bg-slate-700/50 rounded-xl p-3">
                <p class="text-sm font-medium mb-2">
                  File: <span id="file-name" class="text-indigo-400"></span>
                </p>

                <div class="space-y-2">
                  <select id="company-column" class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-sm">
                    <option value="">Colonna Azienda (opzionale)</option>
                  </select>
                  <select id="address-column" class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-sm">
                    <option value="">Colonna Indirizzo</option>
                  </select>
                  <select id="postal-column" class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-sm">
                    <option value="">Colonna CAP (opzionale)</option>
                  </select>
                </div>

                <div class="flex gap-2 mt-3">
                  <button type="button" id="import-btn"
                    class="flex-1 py-2.5 bg-emerald-500 hover:bg-emerald-600 text-white font-semibold rounded-lg transition-all text-sm">
                    Importa
                  </button>
                  <button type="button" id="cancel-import-btn"
                    class="flex-1 py-2.5 bg-slate-600 hover:bg-slate-500 text-white font-semibold rounded-lg transition-all text-sm">
                    Annulla
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div class="p-4 border-b border-slate-700">
            <div class="flex items-center justify-between mb-3">
              <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">Filtri</h2>
              <span id="filter-count" class="text-xs px-2 py-1 bg-slate-700/70 text-slate-200 rounded-full">Mostro 0/0</span>
            </div>

            <input id="search-input" type="text" placeholder="Cerca (azienda, indirizzo, CAP)…"
              class="w-full px-4 py-2.5 bg-slate-700/50 border border-slate-600 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all" />

            <div class="space-y-3 mt-3">
              <select id="company-filter" class="w-full px-4 py-2.5 bg-slate-700/50 border border-slate-600 rounded-xl">
                <option value="">Tutte le aziende</option>
              </select>

              <select id="postal-filter" class="w-full px-4 py-2.5 bg-slate-700/50 border border-slate-600 rounded-xl">
                <option value="">Tutti i CAP</option>
              </select>

              <button id="reset-filters" class="w-full py-2.5 bg-slate-700 hover:bg-slate-600 rounded-xl font-semibold transition-all text-sm">
                Azzera filtri
              </button>

              <button id="delete-filtered" class="w-full py-2.5 bg-red-600/80 hover:bg-red-600 rounded-xl font-semibold transition-all text-sm mt-2">
                Elimina tutti i filtrati
              </button>
            </div>
          </div>

          <div class="p-4 border-b border-slate-700">
            <div class="flex items-center justify-between mb-2">
              <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">Percorso</h2>
              <span id="selected-count" class="text-xs px-2 py-1 bg-indigo-500/20 text-indigo-400 rounded-full">0/10</span>
            </div>

            <p class="text-xs text-slate-400 mb-3">
              Suggerimento: filtra, seleziona dalla lista e poi calcola.
            </p>

            <div class="grid grid-cols-2 gap-2 mb-3">
              <div>
                <label class="text-xs text-slate-400">Partenza</label>
                <select id="start-select" class="w-full mt-1 px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-sm">
                  <option value="">Seleziona...</option>
                  <option value="__GEO__">📍 La mia posizione</option>
                  <option value="__NEW__">Nuovo indirizzo...</option>
                </select>
                <input id="start-new" type="text"
                  class="hidden w-full mt-2 px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-sm"
                  placeholder="Partenza (es: Via Rizzoli 1)" />
              </div>

              <div>
                <label class="text-xs text-slate-400">Arrivo</label>
                <select id="end-select" class="w-full mt-1 px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-sm">
                  <option value="">Seleziona...</option>
                  <option value="__GEO__">📍 La mia posizione</option>
                  <option value="__NEW__">Nuovo indirizzo...</option>
                </select>
                <input id="end-new" type="text"
                  class="hidden w-full mt-2 px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-sm"
                  placeholder="Arrivo" />
              </div>
            </div>

            <div class="grid grid-cols-3 gap-2">
              <button id="optimize-route-btn"
                class="py-2.5 bg-emerald-500 hover:bg-emerald-600 text-white font-semibold rounded-xl transition-all disabled:opacity-50 disabled:cursor-not-allowed"
                disabled>
                Ottimizza
              </button>
              <button id="calc-route-btn"
                class="py-2.5 bg-slate-700 hover:bg-slate-600 text-white font-semibold rounded-xl transition-all disabled:opacity-50 disabled:cursor-not-allowed"
                disabled>
                Calcola
              </button>
              <button id="clear-route-btn"
                class="py-2.5 bg-slate-700 hover:bg-slate-600 text-white font-semibold rounded-xl transition-all">
                Pulisci
              </button>
            </div>
          </div>

          <div class="p-4">
            <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">Indirizzi</h2>
            <div id="address-list" class="space-y-2"></div>
          </div>
        </div>
      </aside>

      <div class="flex-1 relative">
        <div id="map"></div>

        <button id="route-fab"
          class="hidden absolute bottom-4 right-4 px-4 py-2 rounded-xl bg-indigo-500 hover:bg-indigo-600 font-semibold shadow-xl">
          Percorso
        </button>

        <div id="route-info"
          class="absolute top-4 right-4 bg-slate-800/90 backdrop-blur-lg rounded-2xl p-4 shadow-xl border border-slate-700 hidden w-[340px] nice-scroll">
          <div class="flex items-center justify-between gap-2 mb-2">
            <h3 class="font-bold text-lg">Percorso</h3>
            <div class="flex items-center gap-2">
              <button id="open-gmaps-btn" class="text-xs px-2 py-1 rounded-lg bg-slate-700 hover:bg-slate-600">
                Google Maps
              </button>
              <button id="close-route-panel" class="text-xs px-2 py-1 rounded-lg bg-slate-700 hover:bg-slate-600" title="Chiudi">
                ✕
              </button>
            </div>
          </div>
          <div id="route-details" class="text-sm text-slate-300 space-y-1"></div>
        </div>

        <div id="nav-panel">
          <div class="flex items-center justify-between">
            <div class="text-sm font-semibold">Navigazione</div>
            <div class="flex items-center gap-2">
              <select id="nav-speed" class="text-xs bg-slate-800 border border-slate-700 rounded-lg px-2 py-1">
                <option value="1">x1</option>
                <option value="2">x2</option>
                <option value="4">x4</option>
                <option value="8">x8</option>
              </select>
              <button id="nav-toggle" class="text-xs px-3 py-1.5 rounded-lg bg-emerald-500 hover:bg-emerald-600 font-semibold">
                ▶︎ Play
              </button>
              <button id="nav-stop" class="text-xs px-3 py-1.5 rounded-lg bg-slate-700 hover:bg-slate-600 font-semibold">
                Stop
              </button>
            </div>
          </div>

          <div class="mt-2">
            <input id="nav-progress" type="range" min="0" max="100" value="0" class="w-full accent-indigo-500">
            <div class="flex items-center justify-between text-[11px] text-slate-300 mt-1">
              <span id="nav-status">0%</span>
              <span id="nav-eta">—</span>
            </div>
          </div>
        </div>

        <div id="loading" class="absolute inset-0 bg-slate-900/75 backdrop-blur flex items-center justify-center hidden">
          <div class="bg-slate-800/80 border border-slate-700 rounded-2xl p-6 w-[min(420px,calc(100vw-32px))] shadow-2xl">
            <div class="flex items-center gap-3">
              <div class="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
              <div class="min-w-0">
                <p id="loading-text" class="text-slate-100 font-semibold text-base">Elaborazione…</p>
                <p id="loading-sub" class="text-xs text-slate-400 mt-1 truncate">—</p>
              </div>
            </div>
          </div>
        </div>

      </div>
    </main>

    <div id="toast-container" class="fixed bottom-4 right-4 space-y-2"></div>
  </div>

  <script>
    const config = {
      maxAddresses: 999,
      maxRoutePoints: 10,
      importGeocodeDelayMs: 850,
      defaultCenter: [44.4949, 11.3426],
      defaultZoom: 13,
      storageKey: "route_planner_beta_state_it_v9",
      geocodeCacheKey: "route_planner_beta_geocode_cache_it_v9"
    };

    let addresses = [];
    let selectedIds = [];
    let markers = {};
    let map = null;

    let routeLayer = null;
    let routeBadges = {};
    let routeStartMarker = null;
    let routeEndMarker = null;

    let importedData = null;

    let startPoint = null;
    let endPoint = null;

    let lastRoutePoints = null;
    let lastRouteGeo = null;
    let lastRouteDurationSec = 0;

    let routeActive = false;

    // Navigation sim
    let navMarker = null;
    let navTimer = null;
    let navPlaying = false;
    let navT = 0;

    let geocodeCache = {};
    const sleep = (ms) => new Promise(r => setTimeout(r, ms));

    function setLoading(isLoading, text="Elaborazione…", sub="") {
      document.getElementById("loading-text").textContent = text;
      document.getElementById("loading-sub").textContent = sub || "—";
      document.getElementById("loading").classList.toggle("hidden", !isLoading);
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
        .replaceAll('"',"&quot;").replaceAll("'","&#039;");
    }

    function showToast(message, type="info") {
      const container = document.getElementById("toast-container");
      const toast = document.createElement("div");
      const colors = { success:"bg-emerald-500", error:"bg-red-500", warning:"bg-amber-500", info:"bg-indigo-500" };
      toast.className = `toast ${colors[type]||colors.info} text-white px-4 py-3 rounded-xl shadow-lg`;
      toast.innerHTML = `<span class="text-sm">${escapeHtml(message)}</span>`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3200);
    }

    function loadGeocodeCache() { try { geocodeCache = JSON.parse(localStorage.getItem(config.geocodeCacheKey) || "{}"); } catch {} }
    function saveGeocodeCache() { try { localStorage.setItem(config.geocodeCacheKey, JSON.stringify(geocodeCache)); } catch {} }
    function saveState() { try { localStorage.setItem(config.storageKey, JSON.stringify({ addresses })); } catch {} }
    function loadState() {
      try {
        const raw = localStorage.getItem(config.storageKey);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed?.addresses)) addresses = parsed.addresses;
      } catch {}
    }

    function normalizeAddressForGeocode(addr) {
      const shouldAppend = document.getElementById("append-bologna")?.checked ?? true;
      if (!shouldAppend) return addr;
      const low = addr.toLowerCase();
      if (low.includes("bologna") || low.includes("italia") || low.includes("italy")) return addr;
      return `${addr}, Bologna, Italia`;
    }

    async function geocodeAddress(query) {
      const q = query.trim();
      if (!q) return null;
      if (geocodeCache[q]) return geocodeCache[q];

      const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=1`;
      const res = await fetch(url, { headers: { "Accept": "application/json" } });
      if (!res.ok) return null;
      const data = await res.json();
      if (data && data.length) {
        const coords = { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
        geocodeCache[q] = coords;
        saveGeocodeCache();
        return coords;
      }
      return null;
    }

    function initMap() {
      map = L.map("map", { center: config.defaultCenter, zoom: config.defaultZoom, zoomControl: true });
      L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
        attribution: "&copy; OpenStreetMap contributors &copy; CARTO",
        subdomains: "abcd",
        maxZoom: 20
      }).addTo(map);
    }

    // MARKERS
    function markerIconBase(isSelected=false) {
      return L.divIcon({
        className: `custom-marker ${isSelected ? "selected-marker" : ""}`,
        iconSize: [24, 24],
        iconAnchor: [12, 12]
      });
    }

    function markerIconWithBadge(badgeText, isSelected=false, badgeType=null) {
      const badgeClass =
        badgeType === "start" ? "badge start" :
        badgeType === "end" ? "badge end" :
        "badge";
      const wrapClass = `route-badge-wrap ${isSelected ? "selected" : ""}`;
      return L.divIcon({
        className: "",
        iconSize: [28, 28],
        iconAnchor: [14, 14],
        html: `
          <div class="${wrapClass}">
            <div class="dot"></div>
            <div class="${badgeClass}">${escapeHtml(badgeText)}</div>
          </div>
        `
      });
    }

    function bindCompanyTooltip(marker, addrLike) {
      const tooltipHtml = `
        <div style="min-width:180px">
          <div style="font-weight:800; font-size:13px; margin-bottom:4px;">
            ${escapeHtml(addrLike.company || "Senza azienda")}
          </div>
          <div style="font-size:12px; opacity:0.9;">
            ${escapeHtml(addrLike.address || "")}
          </div>
        </div>
      `;
      marker.bindTooltip(tooltipHtml, {
        direction: "top",
        offset: [0, -10],
        opacity: 0.95,
        sticky: true
      });
      marker.on("mouseover", () => marker.openTooltip());
      marker.on("mouseout", () => marker.closeTooltip());
    }

    function createMarker(addr) {
      const isSelected = selectedIds.includes(addr.id);
      const marker = L.marker([addr.lat, addr.lng], { icon: markerIconBase(isSelected) }).addTo(map);
      bindCompanyTooltip(marker, { company: addr.company, address: addr.address });
      marker.on("click", () => toggleAddressSelection(addr.id));
      return marker;
    }

    function rebuildMarkerIconForState(id) {
      const m = markers[id];
      if (!m) return;
      const isSelected = selectedIds.includes(id);

      if (routeBadges[id]?.badgeText != null) {
        const { badgeText, badgeType } = routeBadges[id];
        m.setIcon(markerIconWithBadge(badgeText, isSelected, badgeType));
      } else {
        m.setIcon(markerIconBase(isSelected));
      }
    }

    function getFilters() {
      return {
        company: document.getElementById("company-filter").value,
        postal: document.getElementById("postal-filter").value,
        q: (document.getElementById("search-input").value || "").trim().toLowerCase()
      };
    }

    function getFilteredAddresses() {
      const { company, postal, q } = getFilters();
      let filtered = [...addresses];
      if (company) filtered = filtered.filter(a => (a.company || "") === company);
      if (postal) filtered = filtered.filter(a => (a.postal_code || "") === postal);
      if (q) {
        filtered = filtered.filter(a => {
          const blob = `${a.company||""} ${a.address||""} ${a.postal_code||""}`.toLowerCase();
          return blob.includes(q);
        });
      }
      return filtered;
    }

    // ✅ se esiste un percorso: mostra SOLO punti del percorso
    function shouldShowMarker(addr) {
      if (!routeActive) return true;
      if (routeBadges[addr.id]) return true;
      return false;
    }

    function updateMarkers() {
      Object.values(markers).forEach(m => map.removeLayer(m));
      markers = {};

      const source = routeActive ? addresses : getFilteredAddresses();

      source.forEach(addr => {
        if (!addr.lat || !addr.lng) return;
        if (!shouldShowMarker(addr)) return;
        markers[addr.id] = createMarker(addr);
      });

      if (lastRoutePoints?.length) applyRouteBadges(lastRoutePoints);

      const visible = Object.values(markers);
      if (visible.length) {
        const bounds = visible.map(m => m.getLatLng()).map(ll => [ll.lat, ll.lng]);
        if (bounds.length) map.fitBounds(bounds, { padding: [50, 50] });
      }
    }

    function updateFilterOptions() {
      const companies = [...new Set(addresses.map(a => a.company).filter(Boolean))].sort();
      const postals = [...new Set(addresses.map(a => a.postal_code).filter(Boolean))].sort();

      const companySel = document.getElementById("company-filter");
      const postalSel = document.getElementById("postal-filter");

      const prevC = companySel.value;
      const prevP = postalSel.value;

      companySel.innerHTML = `<option value="">Tutte le aziende</option>` +
        companies.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join("");
      postalSel.innerHTML = `<option value="">Tutti i CAP</option>` +
        postals.map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join("");

      if (companies.includes(prevC)) companySel.value = prevC;
      if (postals.includes(prevP)) postalSel.value = prevP;

      const filteredCount = getFilteredAddresses().length;
      document.getElementById("filter-count").textContent = `Mostro ${filteredCount}/${addresses.length}`;
    }

    function renderAddressList() {
      const container = document.getElementById("address-list");
      const filtered = getFilteredAddresses();

      if (!filtered.length) {
        container.innerHTML = `<div class="text-center py-6 text-slate-500">
          ${addresses.length ? "Nessun risultato con questi filtri" : "Nessun indirizzo caricato"}
        </div>`;
        return;
      }

      container.innerHTML = filtered.map(a => {
        const sel = selectedIds.includes(a.id);
        return `
  <div class="address-card bg-slate-700/40 rounded-xl p-3 cursor-pointer border-2 ${sel ? "border-indigo-500" : "border-transparent"}"
       data-id="${a.id}">
    <div class="flex items-start gap-3">
      <div class="w-8 h-8 rounded-lg ${sel ? "bg-indigo-500" : "bg-slate-600"} flex items-center justify-center flex-shrink-0">
        ${sel ? "✓" : "📍"}
      </div>

      <div class="flex-1 min-w-0">
        <div class="flex items-start justify-between gap-2">
          <p class="font-semibold text-sm truncate">${escapeHtml(a.company || "Senza azienda")}</p>

          <button
            type="button"
            title="Elimina"
            class="delete-btn flex-shrink-0 w-8 h-8 rounded-lg bg-slate-600/70 hover:bg-red-500/80 transition-all grid place-items-center"
            data-del-id="${a.id}">
            🗑️
          </button>
        </div>

        <p class="text-xs text-slate-200/90 truncate">${escapeHtml(a.address)}</p>
        <p class="text-xs text-slate-400 mt-1">CAP: ${escapeHtml(a.postal_code || "—")}</p>
      </div>
    </div>
  </div>
`;
      }).join("");

      container.querySelectorAll("[data-id]").forEach(el => {
        el.addEventListener("click", () => toggleAddressSelection(el.getAttribute("data-id")));
      });

      container.querySelectorAll("[data-del-id]").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
          const id = btn.getAttribute("data-del-id");
          deleteAddress(id);
        });
      });
    }

    function deleteAddress(id) {
      const a = addresses.find(x => x.id === id);
      if (!a) return;

      const ok = confirm(`Eliminare questo indirizzo?\n\n${a.company ? a.company + " — " : ""}${a.address}`);
      if (!ok) return;

      if (routeActive) clearRouteLayersOnly();

      selectedIds = selectedIds.filter(x => x !== id);
      addresses = addresses.filter(x => x.id !== id);

      const startSel = document.getElementById("start-select");
      const endSel = document.getElementById("end-select");
      if (startSel && startSel.value === id) startSel.value = "";
      if (endSel && endSel.value === id) endSel.value = "";

      saveState();
      updateUI();
      updateMarkers();

      showToast("Indirizzo eliminato ✅", "success");
    }

    function deleteFilteredAddresses() {
      const filtered = getFilteredAddresses();

      if (!filtered.length) {
        showToast("Nessun indirizzo da eliminare con i filtri attuali.", "info");
        return;
      }

      const ok = confirm(`Eliminare tutti gli indirizzi filtrati?\n\nTotale: ${filtered.length}\n\nQuesta azione non può essere annullata.`);
      if (!ok) return;

      if (routeActive) clearRouteLayersOnly();

      const toDelete = new Set(filtered.map(a => a.id));
      selectedIds = selectedIds.filter(id => !toDelete.has(id));

      const startSel = document.getElementById("start-select");
      const endSel = document.getElementById("end-select");
      if (startSel && toDelete.has(startSel.value)) startSel.value = "";
      if (endSel && toDelete.has(endSel.value)) endSel.value = "";

      addresses = addresses.filter(a => !toDelete.has(a.id));

      saveState();
      updateUI();
      updateMarkers();

      showToast(`Eliminati ${filtered.length} indirizzi ✅`, "success");
    }

    function toggleAddressSelection(id) {
      const idx = selectedIds.indexOf(id);
      if (idx > -1) selectedIds.splice(idx, 1);
      else {
        if (selectedIds.length >= config.maxRoutePoints) return showToast(`Massimo ${config.maxRoutePoints} punti`, "warning");
        selectedIds.push(id);
      }
      rebuildMarkerIconForState(id);
      updateUI();
    }

    // START/END
    function updateStartEndSelectors() {
      const startSel = document.getElementById("start-select");
      const endSel = document.getElementById("end-select");

      const prevStart = startSel.value;
      const prevEnd = endSel.value;

      startSel.innerHTML = `<option value="">Seleziona...</option><option value="__GEO__">📍 La mia posizione</option><option value="__NEW__">Nuovo indirizzo...</option>`;
      endSel.innerHTML = `<option value="">Seleziona...</option><option value="__GEO__">📍 La mia posizione</option><option value="__NEW__">Nuovo indirizzo...</option>`;

      addresses.forEach(a => {
        startSel.appendChild(new Option(a.address, a.id));
        endSel.appendChild(new Option(a.address, a.id));
      });

      if ([...startSel.options].some(o => o.value === prevStart)) startSel.value = prevStart;
      if ([...endSel.options].some(o => o.value === prevEnd)) endSel.value = prevEnd;

      document.getElementById("start-new").classList.toggle("hidden", startSel.value !== "__NEW__");
      document.getElementById("end-new").classList.toggle("hidden", endSel.value !== "__NEW__");

      const hasSome = selectedIds.length >= 1;
      const hasSE = !!startSel.value && !!endSel.value;
      document.getElementById("calc-route-btn").disabled = !(hasSome && hasSE);
      document.getElementById("optimize-route-btn").disabled = !(hasSome && hasSE);
    }

    async function getBrowserLocationPoint() {
      return new Promise((resolve) => {
        if (!navigator.geolocation) return resolve(null);
        navigator.geolocation.getCurrentPosition(
          (pos) => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude, address: "La mia posizione", company: "La mia posizione", __type: "geo" }),
          () => resolve(null),
          { enableHighAccuracy: true, timeout: 8000, maximumAge: 60000 }
        );
      });
    }

    function pointFromExisting(id) {
      const a = addresses.find(x => x.id === id);
      if (!a || !a.lat || !a.lng) return null;
      return { lat: a.lat, lng: a.lng, address: a.address, company: a.company || "", __type: "addr", id: a.id };
    }

    async function resolveStartEnd() {
      const startSelVal = document.getElementById("start-select").value;
      const endSelVal = document.getElementById("end-select").value;
      const startNew = document.getElementById("start-new").value.trim();
      const endNew = document.getElementById("end-new").value.trim();

      if (!startSelVal) throw new Error("Seleziona un punto di partenza");
      if (!endSelVal) throw new Error("Seleziona un punto di arrivo");

      if (startSelVal === "__GEO__") {
        setLoading(true, "Recupero posizione…", "Partenza");
        const p = await getBrowserLocationPoint();
        if (!p) throw new Error("Impossibile ottenere la posizione (permessi?)");
        startPoint = { ...p, company: "Partenza", address: "La mia posizione" };
      } else if (startSelVal === "__NEW__") {
        if (!startNew) throw new Error("Inserisci l'indirizzo di partenza");
        setLoading(true, "Geocodifica…", "Partenza");
        const c = await geocodeAddress(normalizeAddressForGeocode(startNew));
        if (!c) throw new Error("Impossibile geocodificare la partenza");
        startPoint = { ...c, address: startNew, company: "Partenza", __type: "new" };
      } else {
        const p = pointFromExisting(startSelVal);
        if (!p) throw new Error("Partenza non valida");
        startPoint = p;
      }

      if (endSelVal === "__GEO__") {
        setLoading(true, "Recupero posizione…", "Arrivo");
        const p = await getBrowserLocationPoint();
        if (!p) throw new Error("Impossibile ottenere la posizione (permessi?)");
        endPoint = { ...p, company: "Arrivo", address: "La mia posizione" };
      } else if (endSelVal === "__NEW__") {
        if (!endNew) throw new Error("Inserisci l'indirizzo di arrivo");
        setLoading(true, "Geocodifica…", "Arrivo");
        const c = await geocodeAddress(normalizeAddressForGeocode(endNew));
        if (!c) throw new Error("Impossibile geocodificare l'arrivo");
        endPoint = { ...c, address: endNew, company: "Arrivo", __type: "new" };
      } else {
        const p = pointFromExisting(endSelVal);
        if (!p) throw new Error("Arrivo non valido");
        endPoint = p;
      }
    }

    // ROUTING
    function toLonLat(points) { return points.map(p => `${p.lng},${p.lat}`).join(";"); }
    function sanitizePoints(points) {
      const cleaned = [];
      const EPS = 1e-6;
      for (const p of points) {
        if (!p || typeof p.lat !== "number" || typeof p.lng !== "number") continue;
        const last = cleaned[cleaned.length - 1];
        if (last && Math.abs(last.lat - p.lat) < EPS && Math.abs(last.lng - p.lng) < EPS) continue;
        cleaned.push(p);
      }
      return cleaned;
    }
    function sameCoord(a,b){ const EPS=1e-6; return a&&b&&Math.abs(a.lat-b.lat)<EPS&&Math.abs(a.lng-b.lng)<EPS; }

    async function osrmRouteDriving(points) {
      const pts = sanitizePoints(points);
      if (pts.length < 2) throw new Error("Servono almeno 2 punti distinti.");
      const coords = toLonLat(pts);
      const url = `https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson&steps=true`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`Errore OSRM route (${res.status})`);
      return await res.json();
    }

    async function osrmTripOptimized(points) {
      const pts = sanitizePoints(points);
      if (pts.length < 2) throw new Error("Servono almeno 2 punti distinti.");
      const coords = toLonLat(pts);
      const url = `https://router.project-osrm.org/trip/v1/driving/${coords}?roundtrip=false&source=first&destination=last&overview=full&geometries=geojson&steps=true`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`Errore OSRM trip (${res.status})`);
      return await res.json();
    }

    function hideRoutePanel() {
      document.getElementById("route-info").classList.add("hidden");
      document.getElementById("route-fab").classList.remove("hidden");
    }
    function showRoutePanel() {
      document.getElementById("route-info").classList.remove("hidden");
      document.getElementById("route-fab").classList.add("hidden");
    }

    function clearRouteBadges() {
      Object.keys(routeBadges).forEach(id => {
        const m = markers[id];
        if (m) {
          const isSelected = selectedIds.includes(id);
          m.setIcon(markerIconBase(isSelected));
        }
      });
      routeBadges = {};
      if (routeStartMarker) { map.removeLayer(routeStartMarker); routeStartMarker = null; }
      if (routeEndMarker) { map.removeLayer(routeEndMarker); routeEndMarker = null; }
    }

    function clearRouteLayersOnly() {
      if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
      clearRouteBadges();

      lastRoutePoints = null;
      lastRouteGeo = null;
      lastRouteDurationSec = 0;

      stopNavigation();
      hideRoutePanel();
      document.getElementById("nav-panel").style.display = "none";

      routeActive = false;
      updateMarkers();
    }

    function applyRouteBadges(orderedPoints) {
      clearRouteBadges();

      orderedPoints.forEach((p, idx) => {
        const number = String(idx + 1);

        if (p.__type === "addr" && p.id && markers[p.id]) {
          const m = markers[p.id];
          const isSelected = selectedIds.includes(p.id);

          routeBadges[p.id] = { badgeText: number, badgeType: null };
          m.setIcon(markerIconWithBadge(number, isSelected, null));
        } else {
          const isFirst = idx === 0;
          const isLast = idx === orderedPoints.length - 1;

          const badgeText = isFirst ? "P" : isLast ? "A" : number;
          const badgeType = isFirst ? "start" : isLast ? "end" : null;

          const temp = L.marker([p.lat, p.lng], {
            icon: markerIconWithBadge(badgeText, false, badgeType)
          }).addTo(map);

          bindCompanyTooltip(temp, { company: p.company || (isFirst ? "Partenza" : isLast ? "Arrivo" : "Punto"), address: p.address });

          if (isFirst) routeStartMarker = temp;
          else if (isLast) routeEndMarker = temp;
        }
      });
    }

    function drawRouteGeometry(geojsonGeometry) {
      if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
      routeLayer = L.geoJSON(geojsonGeometry, { style: { color: "#6366f1", weight: 4, opacity: 0.95 } }).addTo(map);
    }

    function showRouteInfo(orderedPoints, distKm, durMin, geoGeom, durSec) {
      lastRoutePoints = orderedPoints;
      lastRouteGeo = geoGeom;
      lastRouteDurationSec = durSec || (durMin * 60);

      const details = document.getElementById("route-details");
      details.innerHTML = `
        <ol class="list-decimal list-inside space-y-1">
          ${orderedPoints.map(p => `<li class="truncate">${escapeHtml(p.address)}</li>`).join("")}
        </ol>
        <div class="mt-3 pt-3 border-t border-slate-600">
          <p class="font-semibold text-emerald-400">Distanza totale: ${distKm.toFixed(2)} km</p>
          <p class="text-xs text-slate-400 mt-1">Durata totale: ${Math.round(durMin)} min</p>
        </div>
      `;
      showRoutePanel();
      document.getElementById("nav-panel").style.display = "block";
      resetNavigation();
    }

    function buildPointsForRoute() {
      const mid = selectedIds
        .map(id => addresses.find(a => a.id === id))
        .filter(Boolean)
        .filter(a => a.lat && a.lng)
        .map(a => ({
          lat: a.lat, lng: a.lng,
          address: a.address,
          company: a.company || "",
          __type: "addr",
          id: a.id
        }));

      const filteredMid = mid.filter(p => !sameCoord(p, startPoint) && !sameCoord(p, endPoint));
      return sanitizePoints([startPoint, ...filteredMid, endPoint]);
    }

    async function calculateRoute() {
      try {
        setLoading(true, "Calcolo percorso…", "OSRM");
        await resolveStartEnd();
        const points = buildPointsForRoute();

        const routeRes = await osrmRouteDriving(points);
        const route = routeRes.routes?.[0];
        if (!route) throw new Error("Percorso non trovato");

        routeActive = true;

        Object.values(markers).forEach(m => map.removeLayer(m));
        markers = {};

        points.forEach(p => {
          if (p.__type === "addr" && p.id) {
            const a = addresses.find(x => x.id === p.id);
            if (a && a.lat && a.lng) markers[a.id] = createMarker(a);
          }
        });

        if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
        clearRouteBadges();
        drawRouteGeometry(route.geometry);
        applyRouteBadges(points);
        showRouteInfo(points, route.distance/1000, route.duration/60, route.geometry, route.duration);

        setLoading(false);
        showToast("Percorso calcolato ✅", "success");
        map.fitBounds(points.map(p => [p.lat, p.lng]), { padding: [50,50] });

      } catch (e) {
        setLoading(false);
        showToast(e.message || "Errore", "error");
      }
    }

    async function optimizeRoute() {
      try {
        setLoading(true, "Ottimizzazione…", "OSRM Trip");
        await resolveStartEnd();
        const points = buildPointsForRoute();

        const tripRes = await osrmTripOptimized(points);
        const trip = tripRes.trips?.[0];
        const waypoints = tripRes.waypoints;

        if (!trip || !waypoints || waypoints.length !== points.length) {
          throw new Error("Ottimizzazione non disponibile → uso Calcola");
        }

        const ordered = new Array(points.length);
        waypoints.forEach((wp, inputIndex) => {
          const seqIndex = wp.waypoint_index;
          ordered[seqIndex] = points[inputIndex];
        });
        if (ordered.some(x => !x)) throw new Error("Ottimizzazione incompleta → uso Calcola");

        routeActive = true;

        Object.values(markers).forEach(m => map.removeLayer(m));
        markers = {};

        ordered.forEach(p => {
          if (p.__type === "addr" && p.id) {
            const a = addresses.find(x => x.id === p.id);
            if (a && a.lat && a.lng) markers[a.id] = createMarker(a);
          }
        });

        if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
        clearRouteBadges();
        drawRouteGeometry(trip.geometry);
        applyRouteBadges(ordered);
        showRouteInfo(ordered, trip.distance/1000, trip.duration/60, trip.geometry, trip.duration);

        setLoading(false);
        showToast("Percorso ottimizzato ✅", "success");
        map.fitBounds(ordered.map(p => [p.lat, p.lng]), { padding: [50,50] });

      } catch (e) {
        setLoading(false);
        showToast((e.message || "Ottimizzazione fallita") + "…", "warning");
        await calculateRoute();
      }
    }

    // NAV SIM
    function resetNavigation() {
      navT = 0;
      updateNavUI();
      if (navMarker) { map.removeLayer(navMarker); navMarker = null; }
      const p = getPointOnRoute(0);
      if (p) navMarker = L.circleMarker([p.lat, p.lng], { radius: 8, weight: 2, color: "#fff", fillColor: "#22c55e", fillOpacity: 1 }).addTo(map);
    }
    function stopNavigation() {
      navPlaying = false;
      if (navTimer) { clearInterval(navTimer); navTimer = null; }
      const btn = document.getElementById("nav-toggle");
      if (btn) btn.textContent = "▶︎ Play";
      document.getElementById("nav-eta").textContent = "—";
    }
    function updateNavUI() {
      const progress = document.getElementById("nav-progress");
      const pct = Math.round(navT * 100);
      progress.value = String(pct);
      document.getElementById("nav-status").textContent = `${pct}%`;
      const remaining = Math.max(0, (1 - navT) * (lastRouteDurationSec || 0));
      if (lastRouteDurationSec) document.getElementById("nav-eta").textContent = `ETA ~${Math.round(remaining/60)} min`;
      else document.getElementById("nav-eta").textContent = "—";
    }
    function getPointOnRoute(t01) {
      if (!lastRouteGeo?.coordinates?.length) return null;
      const coords = lastRouteGeo.coordinates;
      let total = 0;
      const segLen = [];
      for (let i = 0; i < coords.length - 1; i++) {
        const a = coords[i], b = coords[i+1];
        const dx = b[0]-a[0], dy = b[1]-a[1];
        const l = Math.sqrt(dx*dx + dy*dy);
        segLen.push(l);
        total += l;
      }
      if (total === 0) return { lat: coords[0][1], lng: coords[0][0] };
      const target = t01 * total;
      let acc = 0;
      for (let i = 0; i < segLen.length; i++) {
        const l = segLen[i];
        if (acc + l >= target) {
          const a = coords[i], b = coords[i+1];
          const r = (target - acc) / l;
          const lon = a[0] + (b[0]-a[0]) * r;
          const lat = a[1] + (b[1]-a[1]) * r;
          return { lat, lng: lon };
        }
        acc += l;
      }
      const last = coords[coords.length-1];
      return { lat: last[1], lng: last[0] };
    }
    function navTick() {
      const speed = parseFloat(document.getElementById("nav-speed").value || "1");
      navT = Math.min(1, navT + (0.004 * speed));
      const p = getPointOnRoute(navT);
      if (p && navMarker) {
        navMarker.setLatLng([p.lat, p.lng]);
        map.panTo([p.lat, p.lng], { animate: true, duration: 0.25 });
      }
      updateNavUI();
      if (navT >= 1) { stopNavigation(); showToast("Navigazione completata ✅", "success"); }
    }
    function toggleNavigation() {
      if (!lastRouteGeo) return showToast("Prima calcola un percorso", "warning");
      const btn = document.getElementById("nav-toggle");
      if (!navPlaying) {
        navPlaying = true;
        btn.textContent = "⏸ Pausa";
        if (!navMarker) resetNavigation();
        navTimer = setInterval(navTick, 250);
      } else {
        navPlaying = false;
        btn.textContent = "▶︎ Play";
        if (navTimer) { clearInterval(navTimer); navTimer = null; }
      }
    }

    // =========================
    // IMPORT HELPERS (ZIPFLUID)
    // =========================
    function getRowVal(row, candidates) {
      const keys = Object.keys(row || {});
      const map = new Map(keys.map(k => [k.toLowerCase().trim(), k]));
      for (const c of candidates) {
        const hit = map.get(String(c).toLowerCase().trim());
        if (hit != null) return (row[hit] ?? "").toString().trim();
      }
      return "";
    }

    function normalizeStreetWithNumber(streetRaw) {
      let s = (streetRaw || "").trim().replace(/\s*,\s*/g, ", ");
      if (!s) return "";

      // Se non ha virgola e termina con numero: "Via X 36" -> "Via X, 36"
      if (!s.includes(",")) {
        const m = s.match(/^(.*?)(\s+\d+[A-Za-z0-9\/\-]*)$/);
        if (m) s = `${m[1].trim()}, ${m[2].trim()}`;
      }
      return s;
    }

    function composeItalianIndirizzo(street, cap, city, prov) {
      const st = normalizeStreetWithNumber(street);
      const tail = [cap, city, prov].filter(Boolean).join(" ").replace(/\s+/g, " ").trim();
      if (!st) return tail;
      if (!tail) return st;
      return `${st}, ${tail}`;
    }

    // IMPORT
    function parseCSV(text) {
      const raw = text.trim();
      if (!raw) return [];
      const lines = raw.split(/\r?\n/);
      if (lines.length < 2) return [];
      const delimiter = (lines[0].includes(";") && !lines[0].includes(",")) ? ";" : ",";
      const headers = lines[0].split(delimiter).map(h => h.trim()).filter(Boolean);
      const out = [];
      for (let i = 1; i < lines.length; i++) {
        const row = {};
        const values = lines[i].split(delimiter).map(v => v.trim());
        headers.forEach((h, idx) => row[h] = values[idx] ?? "");
        out.push(row);
      }
      return out;
    }
    function parseXLSX(arrayBuffer) {
      const wb = XLSX.read(arrayBuffer, { type: "array" });
      const ws = wb.Sheets[wb.SheetNames[0]];
      return XLSX.utils.sheet_to_json(ws, { defval: "" });
    }

    function populateColumnSelectors(data) {
      const headers = Object.keys(data[0] || {});
      const companySel = document.getElementById("company-column");
      const addressSel = document.getElementById("address-column");
      const postalSel = document.getElementById("postal-column");

      companySel.innerHTML = `<option value="">Colonna Azienda (opzionale)</option>`;
      addressSel.innerHTML = `<option value="">Colonna Indirizzo</option>`;
      postalSel.innerHTML = `<option value="">Colonna CAP (opzionale)</option>`;

      // Detect Zipfluid export headers (case-insensitive)
      const lowHeaders = headers.map(h => h.toLowerCase().trim());
      const hasStreet = lowHeaders.includes("indirizzo");
      const hasCity = lowHeaders.includes("citta") || lowHeaders.includes("città");
      const hasProv = lowHeaders.includes("provincia");
      const hasCap = lowHeaders.includes("cap");

      // Se è il tuo CSV: aggiungo opzione "composta"
      if (hasStreet && hasCity && hasProv && hasCap) {
        addressSel.insertAdjacentHTML(
          "beforeend",
          `<option value="__ZIPFLUID_COMPOSE__">Indirizzo (Indirizzo + CAP + Città + Provincia)</option>`
        );
        addressSel.value = "__ZIPFLUID_COMPOSE__";
      }

      headers.forEach(h => {
        companySel.appendChild(new Option(h, h));
        addressSel.appendChild(new Option(h, h));
        postalSel.appendChild(new Option(h, h));

        const low = h.toLowerCase();

        if (
          low.includes("azienda") || low.includes("company") ||
          low.includes("nome") || low.includes("name") || low.includes("empresa")
        ) companySel.value = h;

        if (
          addressSel.value !== "__ZIPFLUID_COMPOSE__" &&
          (low.includes("indirizzo") || low.includes("address") || low.includes("dirección") || low.includes("direccion"))
        ) addressSel.value = h;

        if (low === "cap" || low.includes("postal") || low.includes("zip") || low.includes("codigo")) {
          postalSel.value = h;
        }
      });

      // Defaults ideali per Zipfluid
      if (addressSel.value === "__ZIPFLUID_COMPOSE__") {
        const hAzienda = headers.find(x => x.toLowerCase().trim() === "azienda");
        const hCap2 = headers.find(x => x.toLowerCase().trim() === "cap");
        if (hAzienda) companySel.value = hAzienda;
        if (hCap2) postalSel.value = hCap2;
      }
    }

    function handleFileSelect(file) {
      document.getElementById("file-name").textContent = file.name;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          let data = [];
          const name = file.name.toLowerCase();
          if (name.endsWith(".csv")) data = parseCSV(e.target.result);
          else if (name.endsWith(".xlsx") || name.endsWith(".xls")) data = parseXLSX(e.target.result);
          else return showToast("Formato non supportato", "error");

          if (!data.length) return showToast("Nessun dato trovato", "error");
          importedData = data;
          populateColumnSelectors(data);
          document.getElementById("file-preview").classList.remove("hidden");
        } catch {
          showToast("Errore lettura file", "error");
        }
      };
      if (file.name.toLowerCase().endsWith(".csv")) reader.readAsText(file);
      else reader.readAsArrayBuffer(file);
    }

    function setupImportHandlers() {
      const toggleBtn = document.getElementById("toggle-import-form");
      const importSection = document.getElementById("import-form-section");
      const dropZone = document.getElementById("drop-zone");
      const fileInput = document.getElementById("file-input");
      const cancelBtn = document.getElementById("cancel-import-btn");

      toggleBtn.addEventListener("click", () => {
        importSection.classList.toggle("hidden");
        if (!importSection.classList.contains("hidden")) {
          fileInput.value = "";
          document.getElementById("file-preview").classList.add("hidden");
          importedData = null;
        }
      });

      dropZone.addEventListener("click", () => fileInput.click());
      ["dragenter","dragover","dragleave","drop"].forEach(name => {
        dropZone.addEventListener(name, (e) => { e.preventDefault(); e.stopPropagation(); });
      });
      dropZone.addEventListener("drop", (e) => {
        const files = e.dataTransfer.files;
        if (files && files.length) { fileInput.files = files; handleFileSelect(files[0]); }
      });
      fileInput.addEventListener("change", (e) => {
        if (e.target.files && e.target.files.length) handleFileSelect(e.target.files[0]);
      });

      document.getElementById("import-btn").addEventListener("click", processImport);
      cancelBtn.addEventListener("click", () => {
        importSection.classList.add("hidden");
        fileInput.value = "";
        document.getElementById("file-preview").classList.add("hidden");
        importedData = null;
      });
    }

    async function processImport() {
      if (!importedData?.length) return showToast("Nessun dato", "warning");
      const companyCol = document.getElementById("company-column").value;
      const addressCol = document.getElementById("address-column").value;
      const postalCol = document.getElementById("postal-column").value;
      if (!addressCol) return showToast("Seleziona la colonna Indirizzo", "warning");

      const importBtn = document.getElementById("import-btn");
      importBtn.disabled = true;

      let ok = 0, err = 0;

      for (let i = 0; i < importedData.length; i++) {
        const row = importedData[i];

        // ✅ costruisco l'indirizzo in stile: "Via X, 36, 40033 Città BO"
        let addr = "";
        if (addressCol === "__ZIPFLUID_COMPOSE__") {
          const street = getRowVal(row, ["Indirizzo"]);
          const cap = getRowVal(row, ["CAP"]);
          const city = getRowVal(row, ["Citta", "Città"]);
          const prov = getRowVal(row, ["Provincia"]);
          addr = composeItalianIndirizzo(street, cap, city, prov);
        } else {
          addr = (row[addressCol] ?? "").toString().trim();
        }

        if (!addr) continue;

        setLoading(true, `Importazione ${i+1}/${importedData.length}…`, addr);
        const coords = await geocodeAddress(normalizeAddressForGeocode(addr));
        if (!coords) { err++; await sleep(config.importGeocodeDelayMs); continue; }

        const id = (crypto.randomUUID ? crypto.randomUUID() : (Date.now().toString() + Math.random().toString(16).slice(2)));

        addresses.push({
          id,
          company: companyCol ? (row[companyCol] ?? "").toString().trim() : "",
          address: addr,
          postal_code:
            addressCol === "__ZIPFLUID_COMPOSE__"
              ? getRowVal(row, ["CAP"])
              : (postalCol ? (row[postalCol] ?? "").toString().trim() : ""),
          lat: coords.lat,
          lng: coords.lng
        });

        ok++;
        await sleep(config.importGeocodeDelayMs);
      }

      importBtn.disabled = false;
      setLoading(false);

      saveState();
      updateUI();
      updateMarkers();
      showToast(`Import: ${ok} ok${err ? ` • ${err} errori` : ""}`, ok ? "success" : "error");
    }

    // UI
    function updateUI() {
      document.getElementById("address-count").textContent = `${addresses.length} indirizz${addresses.length !== 1 ? "i" : "o"}`;
      document.getElementById("selected-count").textContent = `${selectedIds.length}/${config.maxRoutePoints}`;
      updateFilterOptions();
      renderAddressList();
      updateStartEndSelectors();
    }

    // Google Maps
    function isIOS() { return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream; }
    function isAndroid() { return /Android/.test(navigator.userAgent); }

    function openGoogleMapsNavigation(points) {
      if (!points || points.length < 2) { showToast("Prima calcola un percorso", "warning"); return; }
      const origin = points[0];
      const dest = points[points.length - 1];
      const mid = points.slice(1, -1);

      const webOrigin = encodeURIComponent(`${origin.lat},${origin.lng}`);
      const webDest = encodeURIComponent(`${dest.lat},${dest.lng}`);
      const webWaypoints = mid.length ? `&waypoints=${mid.map(p => encodeURIComponent(`${p.lat},${p.lng}`)).join("%7C")}` : "";
      const webUrl = `https://www.google.com/maps/dir/?api=1&origin=${webOrigin}&destination=${webDest}&travelmode=driving${webWaypoints}`;

      if (isAndroid()) {
        if (mid.length > 0) { window.open(webUrl, "_blank", "noopener,noreferrer"); return; }
        const navUrl = `google.navigation:q=${dest.lat},${dest.lng}&mode=d`;
        window.location.href = navUrl;
        return;
      }
      window.open(webUrl, "_blank", "noopener,noreferrer");
    }

    // Mobile sidebar
    function setupMobileSidebar() {
      const sidebar = document.getElementById("sidebar");
      const backdrop = document.getElementById("sidebar-backdrop");
      const toggleBtn = document.getElementById("toggle-panel");

      function openSidebar() { sidebar.classList.remove("-translate-x-full"); backdrop.classList.remove("hidden"); }
      function closeSidebar() { sidebar.classList.add("-translate-x-full"); backdrop.classList.add("hidden"); }
      function isOpen() { return !sidebar.classList.contains("-translate-x-full"); }

      toggleBtn.addEventListener("click", (e) => { e.stopPropagation(); isOpen() ? closeSidebar() : openSidebar(); });
      backdrop.addEventListener("click", closeSidebar);

      document.getElementById("map").addEventListener("click", () => {
        if (window.innerWidth < 1024 && isOpen()) closeSidebar();
      });
    }

    // Events
    async function handleFormSubmit(e) {
      e.preventDefault();
      const company = document.getElementById("company-input").value.trim();
      const address = document.getElementById("address-input").value.trim();
      if (!address) return showToast("Inserisci un indirizzo", "warning");

      setLoading(true, "Geocodifica…", address);
      const coords = await geocodeAddress(normalizeAddressForGeocode(address));
      if (!coords) { setLoading(false); return showToast("Impossibile geocodificare", "error"); }

      const id = (crypto.randomUUID ? crypto.randomUUID() : (Date.now().toString() + Math.random().toString(16).slice(2)));
      addresses.push({
        id,
        company,
        address,
        postal_code: document.getElementById("postal-input").value.trim() || "",
        lat: coords.lat,
        lng: coords.lng
      });

      document.getElementById("company-input").value = "";
      document.getElementById("address-input").value = "";
      document.getElementById("postal-input").value = "";

      saveState();
      setLoading(false);
      updateUI();
      if (!routeActive) updateMarkers();
      showToast("Indirizzo aggiunto ✅", "success");
    }

    function setupEvents() {
      document.getElementById("address-form").addEventListener("submit", handleFormSubmit);

      const rerender = () => { updateUI(); if (!routeActive) updateMarkers(); };

      document.getElementById("company-filter").addEventListener("change", rerender);
      document.getElementById("postal-filter").addEventListener("change", rerender);
      document.getElementById("search-input").addEventListener("input", rerender);

      document.getElementById("reset-filters").addEventListener("click", () => {
        document.getElementById("company-filter").value = "";
        document.getElementById("postal-filter").value = "";
        document.getElementById("search-input").value = "";
        rerender();
      });

      document.getElementById("delete-filtered").addEventListener("click", () => {
        deleteFilteredAddresses();
      });

      document.getElementById("start-select").addEventListener("change", updateStartEndSelectors);
      document.getElementById("end-select").addEventListener("change", updateStartEndSelectors);

      document.getElementById("calc-route-btn").addEventListener("click", calculateRoute);
      document.getElementById("optimize-route-btn").addEventListener("click", optimizeRoute);

      document.getElementById("clear-route-btn").addEventListener("click", () => {
        selectedIds = [];
        updateUI();
        clearRouteLayersOnly();
        showToast("Percorso pulito", "info");
      });

      document.getElementById("close-route-panel").addEventListener("click", hideRoutePanel);
      document.getElementById("route-fab").addEventListener("click", showRoutePanel);
      document.getElementById("open-gmaps-btn").addEventListener("click", () => openGoogleMapsNavigation(lastRoutePoints));

      document.getElementById("nav-toggle").addEventListener("click", toggleNavigation);
      document.getElementById("nav-stop").addEventListener("click", () => { stopNavigation(); resetNavigation(); });
    }

    function init() {
      loadGeocodeCache();
      loadState();
      initMap();
      setupMobileSidebar();
      setupImportHandlers();
      setupEvents();
      updateUI();
      updateMarkers();
      showToast("Pronto ✅", "success");
    }

    init();
  </script>
</body>
</html>
